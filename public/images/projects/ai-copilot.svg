<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none" role="img" aria-label="AI copilot — streaming chat with tool calls">
  <rect width="1280" height="800" fill="#0e0e11"/>
  <ellipse cx="640" cy="880" rx="720" ry="340" fill="#c75c37" opacity="0.10"/>

  <!-- header -->
  <text x="64" y="92" font-family="ui-monospace, SFMono-Regular, monospace" font-size="22" letter-spacing="4" fill="#a1a1aa">AI COPILOT — STREAMING</text>
  <circle cx="1140" cy="84" r="6" fill="#c75c37"/>
  <text x="1216" y="92" text-anchor="end" font-family="ui-monospace, monospace" font-size="20" fill="#71717a">live</text>

  <!-- assistant message + tool trace -->
  <rect x="64" y="150" width="640" height="172" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="96" y="186" width="392" height="15" rx="7.5" fill="#ffffff" fill-opacity="0.22"/>
  <rect x="96" y="218" width="540" height="15" rx="7.5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="96" y="262" width="248" height="38" rx="19" fill="#c75c37" fill-opacity="0.14" stroke="#c75c37" stroke-opacity="0.40"/>
  <text x="118" y="287" font-family="ui-monospace, monospace" font-size="18" fill="#e3a587">▸ tool: search()</text>

  <!-- user message -->
  <rect x="616" y="356" width="600" height="104" rx="22" fill="#c75c37" fill-opacity="0.18" stroke="#c75c37" stroke-opacity="0.30"/>
  <rect x="648" y="392" width="380" height="15" rx="7.5" fill="#f4d8cc" fill-opacity="0.55"/>
  <rect x="648" y="420" width="232" height="15" rx="7.5" fill="#f4d8cc" fill-opacity="0.32"/>

  <!-- assistant streaming reply -->
  <rect x="64" y="494" width="720" height="150" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="96" y="530" width="624" height="15" rx="7.5" fill="#ffffff" fill-opacity="0.22"/>
  <rect x="96" y="562" width="664" height="15" rx="7.5" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="96" y="594" width="300" height="15" rx="7.5" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="404" y="588" width="10" height="24" rx="3" fill="#c75c37"/>

  <!-- composer -->
  <rect x="64" y="690" width="1152" height="74" rx="37" fill="#17171a" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="104" y="735" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#71717a">Ask anything — voice or text…</text>
  <circle cx="1168" cy="727" r="27" fill="#c75c37"/>
  <path d="M1156 727h22m-9-9 9 9-9 9" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
