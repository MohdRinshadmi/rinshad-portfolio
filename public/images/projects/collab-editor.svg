<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none" role="img" aria-label="Real-time collaborative editor with live cursors and presence">
  <rect width="1280" height="800" fill="#0e0e11"/>
  <ellipse cx="640" cy="880" rx="720" ry="340" fill="#c75c37" opacity="0.08"/>

  <!-- header + presence avatars -->
  <text x="64" y="92" font-family="ui-monospace, monospace" font-size="22" letter-spacing="4" fill="#a1a1aa">COLLABORATIVE EDITOR — LIVE</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle">
    <circle cx="1216" cy="82" r="22" fill="#c75c37"/><text x="1216" y="89" fill="#fff">R</text>
    <circle cx="1170" cy="82" r="22" fill="#6b8aa1"/><text x="1170" y="89" fill="#fff">A</text>
    <circle cx="1124" cy="82" r="22" fill="#8a9a72"/><text x="1124" y="89" fill="#fff">M</text>
    <circle cx="1078" cy="82" r="22" fill="#17171a" stroke="#ffffff" stroke-opacity="0.12"/><text x="1078" y="89" fill="#71717a" font-size="17">+5</text>
  </g>

  <!-- document title -->
  <rect x="64" y="156" width="430" height="22" rx="11" fill="#ffffff" fill-opacity="0.30"/>

  <!-- paragraph lines -->
  <g fill="#ffffff">
    <rect x="64" y="226" width="1040" height="14" rx="7" fill-opacity="0.16"/>
    <rect x="64" y="258" width="1112" height="14" rx="7" fill-opacity="0.16"/>
    <rect x="64" y="290" width="864" height="14" rx="7" fill-opacity="0.16"/>
  </g>

  <!-- cursor 1 (R, accent) on a line + selection -->
  <rect x="64" y="352" width="560" height="22" rx="6" fill="#c75c37" fill-opacity="0.16"/>
  <rect x="624" y="350" width="3" height="26" fill="#c75c37"/>
  <rect x="627" y="338" width="56" height="22" rx="6" fill="#c75c37"/>
  <text x="655" y="354" font-family="ui-sans-serif, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Rinshad</text>

  <g fill="#ffffff">
    <rect x="64" y="404" width="980" height="14" rx="7" fill-opacity="0.16"/>
    <rect x="64" y="436" width="1080" height="14" rx="7" fill-opacity="0.16"/>
  </g>

  <!-- cursor 2 (A, slate) -->
  <rect x="430" y="466" width="3" height="26" fill="#6b8aa1"/>
  <rect x="433" y="454" width="42" height="22" rx="6" fill="#6b8aa1"/>
  <text x="454" y="470" font-family="ui-sans-serif, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Aïsha</text>
  <g fill="#ffffff">
    <rect x="64" y="468" width="360" height="14" rx="7" fill-opacity="0.16"/>
    <rect x="64" y="520" width="940" height="14" rx="7" fill-opacity="0.16"/>
    <rect x="64" y="552" width="700" height="14" rx="7" fill-opacity="0.16"/>
  </g>

  <!-- inline AI assist chip -->
  <rect x="64" y="624" width="300" height="44" rx="22" fill="#c75c37" fill-opacity="0.12" stroke="#c75c37" stroke-opacity="0.35"/>
  <circle cx="92" cy="646" r="5" fill="#c75c37"/>
  <text x="110" y="652" font-family="ui-monospace, monospace" font-size="17" fill="#e3a587">AI · summarize selection</text>

  <!-- status bar -->
  <text x="64" y="742" font-family="ui-monospace, monospace" font-size="17" fill="#71717a">CRDT · synced</text>
  <text x="1216" y="742" text-anchor="end" font-family="ui-monospace, monospace" font-size="17" fill="#71717a">20 editing · conflict-free</text>
</svg>
